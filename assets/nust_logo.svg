<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#2e86c1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="100%" style="stop-color:#d4ac0d"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#shield)" stroke="#d4ac0d" stroke-width="3"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Book/Knowledge symbol -->
  <g transform="translate(100,75)">
    <!-- Open book -->
    <path d="M-25,0 Q-25,-15 0,-20 Q25,-15 25,0 L25,25 Q25,10 0,15 Q-25,10 -25,25 Z" fill="rgba(255,255,255,0.9)" stroke="url(#gold)" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="15" stroke="url(#gold)" stroke-width="1"/>
    <!-- Star above book -->
    <polygon points="0,-30 3,-22 11,-22 5,-17 7,-9 0,-13 -7,-9 -5,-17 -11,-22 -3,-22" fill="url(#gold)"/>
  </g>

  <!-- NUST text -->
  <text x="100" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white" letter-spacing="4">NUST</text>

  <!-- Tagline arc -->
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)" letter-spacing="1.5">NATIONAL UNIVERSITY OF</text>
  <text x="100" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)" letter-spacing="1.5">SCIENCES &amp; TECHNOLOGY</text>

  <!-- Bottom accent -->
  <path d="M50,175 Q100,185 150,175" fill="none" stroke="url(#gold)" stroke-width="2"/>
</svg>
